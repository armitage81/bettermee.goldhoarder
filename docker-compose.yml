services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8081:80"
    volumes:
      - ./app:/var/www/html
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-goldhoarder}
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-root}
      - APP_ENV=${APP_ENV:-development}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: goldhoarder
    ports:
      - "3307:3306"
    volumes:
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
